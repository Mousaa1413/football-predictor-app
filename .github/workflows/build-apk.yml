# بناء APK يدوياً على ubuntu-latest — بدون Docker action خارجي
name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. System dependencies for Buildozer
      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          # ملاحظة: لا نثبت libsdl2-*-dev على الـ host.
          # p4a يبني SDL2 داخل bootstrap؛ ووجود حزم SDL على النظام يجعل
          # kivy 2.3.x setup.py يدمج -I/usr/include/* عبر pkg-config في
          # أوامر NDK clang → خطأ __GNUC_PREREQ / sys/cdefs.h.
          sudo apt-get install -y --no-install-recommends \
            git zip unzip wget curl rsync patch \
            openjdk-17-jdk \
            build-essential ccache cmake \
            autoconf automake libtool pkg-config autoconf-archive \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev libltdl-dev \
            gettext autopoint libgmp-dev libmpc-dev libmpfr-dev \
            libgdbm-dev lbzip2 xz-utils \
            libbz2-dev liblzma-dev libsqlite3-dev
          # libtinfo5/libncurses5 غير متوفرة على Ubuntu 24.04 (noble) — تجاهل الفشل
          sudo apt-get install -y --no-install-recommends libtinfo5 libncurses5 || true
          # تحقق صريح: liblzma recipe يحتاج autopoint أثناء autoreconf
          command -v autopoint
          autopoint --version | head -n1
          java -version
          python --version

      # 4. Buildozer + Cython via pip
      - name: Install Buildozer and Cython
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade "Cython>=0.29,<3.1" virtualenv
          python -m pip install --upgrade buildozer
          buildozer --version

      # تجهيز نقطة الدخول (p4a يشغّل main.py — نستخدم واجهة Kivy من app.py)
      - name: Prepare Android entrypoint
        run: |
          set -euo pipefail
          mkdir -p data models
          touch data/.gitkeep models/.gitkeep
          if [ -f main.py ]; then
            cp -f main.py main_cli.py
          fi
          cp -f app.py main.py
          head -n 5 main.py

      # 5. buildozer android debug
      - name: Build APK
        run: |
          set -euo pipefail
          buildozer -v android debug

      # 6. Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-predictor-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
