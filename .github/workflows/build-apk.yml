# يبني APK عبر Buildozer على Ubuntu مباشرة (بدون third-party buildozer-action)
name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Buildozer APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git zip unzip tar wget curl ccache pkg-config autoconf automake \
            libtool cmake patch gettext build-essential \
            openjdk-17-jdk-headless \
            python3-dev python3-pip python3-setuptools \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            libffi-dev libssl-dev libltdl-dev libjpeg-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            ffmpeg libgdbm-dev libbz2-dev libsqlite3-dev libreadline-dev \
            liblzma-dev uuid-dev

      - name: Install Buildozer, Cython, virtualenv
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel setuptools
          # Cython 0.29.x أكثر توافقًا مع وصفات p4a القديمة/المتوسطة
          python -m pip install 'Cython>=0.29.33,<3' virtualenv
          python -m pip install git+https://github.com/kivy/buildozer.git
          buildozer --version
          java -version
          python --version

      - name: Prepare app sources for Android
        run: |
          set -euo pipefail
          mkdir -p data models
          touch data/.gitkeep models/.gitkeep

          # p4a يشغّل main.py فقط. في المستودع main.py = CLI،
          # لذلك نحتفظ بنسخة CLI ونستبدل نقطة الدخول بواجهة Kivy.
          if [ -f main.py ]; then
            cp -f main.py main_cli.py
          fi
          cp -f app.py main.py
          echo "Android entrypoint ready:"
          head -n 5 main.py

      - name: Cache Buildozer global + project build
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-u22-${{ hashFiles('buildozer.spec', 'app.py', 'requirements-mobile.txt') }}
          restore-keys: |
            buildozer-u22-

      - name: Optional live data fetch
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FOOTBALL_DATA_API_TOKEN:-}" ]; then
            echo "No FOOTBALL_DATA_API_TOKEN secret — building APK without fresh API data."
            exit 0
          fi
          python -m pip install -r requirements.txt
          python fetch_data.py --n 50 --next 20 || echo "fetch_data failed (non-fatal)"

      - name: Build debug APK with Buildozer
        run: |
          set -euo pipefail
          # أول تشغيل ينزّل SDK/NDK/p4a تلقائيًا إلى ~/.buildozer
          buildozer -v android debug

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          echo "Searching for APK..."
          mapfile -t APKS < <(find bin .buildozer -type f -name '*.apk' 2>/dev/null | sort -u || true)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "No APK found under bin/ or .buildozer/"
            find . -name '*.apk' -type f 2>/dev/null || true
            ls -la bin 2>/dev/null || true
            ls -la .buildozer 2>/dev/null || true
            exit 1
          fi
          echo "Found:"
          printf '  %s\n' "${APKS[@]}"
          mkdir -p artifacts
          PRIMARY="${APKS[0]}"
          cp -f "$PRIMARY" "artifacts/football-predictor.apk"
          for f in "${APKS[@]}"; do
            cp -f "$f" "artifacts/$(basename "$f")"
          done
          echo "primary=artifacts/football-predictor.apk" >> "$GITHUB_OUTPUT"
          ls -lah artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-predictor-apk
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Buildozer logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            .buildozer/**/*.log
            .buildozer/**/build.log
            buildozer.log
            bin/**
            ~/.buildozer/android/platform/**/*.log
          if-no-files-found: ignore
          retention-days: 7
