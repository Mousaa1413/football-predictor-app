# يبني APK (Buildozer + Kivy) عند كل push ويرفعه كـ Artifact
name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Buildozer APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure data/models folders exist
        run: |
          mkdir -p data models
          touch data/.gitkeep models/.gitkeep

      # اختياري: إن وُجد السر، اجلب بيانات حية لتُحزم داخل الـ APK
      - name: Optional live data fetch
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
        run: |
          if [ -z "${FOOTBALL_DATA_API_TOKEN}" ]; then
            echo "No FOOTBALL_DATA_API_TOKEN secret — building APK without fresh API data."
            exit 0
          fi
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 fetch_data.py --n 50 --next 20 || echo "fetch_data failed (non-fatal)"

      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: build
        with:
          workdir: .
          command: buildozer -v android debug
          buildozer_version: master

      - name: Locate APK
        id: apk
        run: |
          set -e
          echo "Searching for APK..."
          mapfile -t APKS < <(find bin .buildozer -type f -name '*.apk' 2>/dev/null | sort -u || true)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "No APK found under bin/ or .buildozer/"
            find . -name '*.apk' -type f 2>/dev/null || true
            ls -la bin 2>/dev/null || true
            exit 1
          fi
          echo "Found:"
          printf '  %s\n' "${APKS[@]}"
          # انسخ إلى مسار ثابت للـ artifact
          mkdir -p artifacts
          PRIMARY="${APKS[0]}"
          cp -f "$PRIMARY" "artifacts/football-predictor.apk"
          # انسخ البقية إن وُجدت
          i=0
          for f in "${APKS[@]}"; do
            cp -f "$f" "artifacts/$(basename "$f")"
            i=$((i + 1))
          done
          echo "primary=artifacts/football-predictor.apk" >> "$GITHUB_OUTPUT"
          ls -lah artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-predictor-apk
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Buildozer logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            .buildozer/**/*.log
            buildozer.log
            bin/**
          if-no-files-found: ignore
          retention-days: 7
